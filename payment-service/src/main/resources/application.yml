server:
  port: 8081

spring:
  application:
    name: payment-service
  # 1. Virtual Threads 활성화
  threads:
    virtual:
      enabled: true

  # 2. Database (PostgreSQL) - Transactional Outbox을 위한 저장소
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: ${POSTGRES_USER:payment_user}
    password: ${POSTGRES_PASSWORD:payment_pass}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # 3. Redis - 멱등성 키, Rate Limit, 주문 금액 사전 검증용
  data:
    redis:
      host: localhost
      port: 6379

  # 4. Kafka - 계정계(Ledger) 전송용 메시지 브로커
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.JsonSerializer
      acks: all     # 데이터 유실 방지를 위한 필수 설정
      retries: 5    # 실패시 재시도 횟수 (데이터 정합성)
    properties:
      spring.json.add.type.headers: false   # 다른 서비스와의 호환성을 위해 헤더 정보 간소화
      enable.idempotence: true              # 메시지 전달 보장 수준을 높이기 위한 추가 설정
      # 재시도 간격 설정 (처음엔 100ms, 실패할수록 지수적으로 늘림)
      retry.backoff.ms: 100
      delivery.timeout.ms: 120000 # 최대 2분간 재시도 시도
      max.in.flight.requests.per.connection: 5


# 5. 결제 API 연동
payment:
  toss:
    base-url: https://api.tosspayments.com
    secret-key: ${TOSS_SECRET_KEY:test_sk_0123456789}
  portone:
    base-url: https://api.iamport.kr # 포트원 V1 기준
    api-key: ${PORTONE_API_KEY:imp_12345678}
    api-secret: ${PORTONE_API_SECRET:secret_12345678}
#      v2:
#        base-url: https://api.portone.io
#        store-id: ${PORTONE_STORE_ID:store-12345} # 상점 ID (V2에서 추가됨)
#        api-secret: ${PORTONE_API_SECRET:sk_test_12345} # 시크릿 키

# 6. Resilience4j 상세 설정 (가용량 제어 및 서킷 브레이커, 카드사 및 결제 API)
resilience4j:
  circuitbreaker:
    instances:
      cardApproval: # 카드사 승인 API 용 서킷 브레이커
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      tossApproval:
        baseConfig: default
        portoneApproval:
          baseConfig: default
  ratelimiter:
    instances:
      merchantLimit: # 가맹점 별 호출 제한 (현재 1초에 100건)
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 0

# 7. Actuator - 시스템 헬스 체커 / Prometheus & Grafana 설정
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus # prometheus 추가 필수
  metrics:
    tags:
      application: ${spring.application.name} # 서비스 구분을 위한 태그
  tracing:
    sampling:
      probability: 1.0  # 모든 트래픽 추적
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"