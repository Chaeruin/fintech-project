# 결제 서비스(8080)와 충돌하지 않도록 설정
server:
  port: 8082

spring:
  application:
    name: settlement-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5433/settlement_db  # DB명 확인 필요
    username: ${POSTGRES_USER:settlement_user}
    password: ${POSTGRES_PASSWORD:settlement_pass}
    driver-class-name: org.postgresql.Driver

  # 개발 단계에서는 update, 운영은 none 또는 validate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: settlement-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        partition.assignment.strategy: org.apache.kafka.clients.consumer.CooperativeStickyAssignor
        # 세션 타임아웃 튜닝: 불필요한 리밸런싱 방지
        session.timeout.ms: 45000
        heartbeat.interval.ms: 15000
        # 한 번에 가져오는 양 조절
        max.poll.records: 500
        max.poll.interval.ms: 300000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: manual

logging:
  level:
    fintech.settlement: debug
    org.springframework.kafka: info
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
  tracing:
    sampling:
      probability: 1.0  # 모든 트래픽 추적
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: prometheus, health, info  # Prometheus 수집을 위해 필수!
  metrics:
    tags:
      application: ${spring.application.name} # Grafana에서 서비스 구분을 위한 태그

