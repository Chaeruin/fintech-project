version: '3.8'

services:
  # 1. Database (PostgreSQL)
  payment-db:
    image: postgres:15
    container_name: payment-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=payment_user
      - POSTGRES_PASSWORD=payment_pass
      - POSTGRES_DB=payment_db
    volumes:
        - ./data/postgres:/var/lib/postgresql/data
    networks:
      - toss-network

  settlement-db:
    image: postgres:15
    container_name: settlement-db
    ports:
      - "5433:5432" # 로컬 포트 중복 방지 - 5433 사용
    environment:
      - POSTGRES_USER=settlement_user
      - POSTGRES_PASSWORD=settlement_pass
      - POSTGRES_DB=settlement_db
    volumes:
      - ./data/settlement-postgres:/var/lib/postgresql/data
    networks:
      - toss-network

  # 2. Cache & Rate Limit (Redis)
  payment-redis:
    image: redis:7-alpine
    container_name: payment-redis
    ports:
      - "6379:6379"
    networks:
      - toss-network

  zookeeper: # Kafka를 위한 주키퍼 추가
    image: bitnami/zookeeper:latest
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - toss-network

  # 3. Message Broker (Kafka)
  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_ANONYMOUS_LOGIN=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092 # 컨테이너 내부 통신용
    networks:
      - toss-network

  # 분산 추적 서버
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - toss-network

  # 4. API Gateway
  api-gateway:
    build: ./payment-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=payment-redis
    networks:
      - toss-network

  # 5. Payment Service (Virtual Thread)
  payment-service:
    build: ./payment-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://payment-db:5432/payment_db
      - SPRING_DATA_REDIS_HOST=payment-redis
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - toss-network

  settlement-service:
    build: ./settlement-service
    container_name: settlement-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://settlement-db:5432/settlement_db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - toss-network

  # 6. Monitoring (Prometheus & Grafana)
  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - toss-network
    depends_on:
      - payment-service
      - settlement-service

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - toss-network
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

networks:
  toss-network:
    driver: bridge